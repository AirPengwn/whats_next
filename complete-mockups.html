<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>What's Next — Complete Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  .site{
    --bg:#faf6ec;--bg2:#f4efe4;--bg3:#ece6d8;
    --t1:#211d16;--t2:#46412f;--t3:#736c58;
    --bd:rgba(40,30,12,0.13);--bds:rgba(40,30,12,0.24);
    --r1:8px;--r2:12px;
    --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --serif:'Newsreader','Charter','Iowan Old Style',Georgia,serif;
    --teal:#4e9836;--teal-bg:#eaf3e5;--teal-t:#3c7b20;
    --blue:#3a7878;--blue-bg:#e5f0f0;
    --amber:#8a6f00;--amber-bg:#f5f0db;--amber-t:#6b5500;
    --red:#993c1d;--red-bg:#faece7;
    --purple-bg:#e8e4fe;--purple-t:#4c3bc4;
    font-family:var(--fn);background:var(--bg3);color:var(--t1);
    width:100%;height:100%;overflow:hidden;
  }
  /* Warm variant — Option for the "this afternoon" Light Theme Warmth */
  .site.warm{
    --bg:#FAF8F1;--bg2:#F2EFE6;--bg3:#EBE6D9;
    --t1:#1f1d18;--t2:#46423a;--t3:#7b756a;
    --bd:rgba(60,40,15,0.10);--bds:rgba(60,40,15,0.20);
    --teal-bg:#e8f0e0;--amber-bg:#f3eccf;--blue-bg:#e1edec;--red-bg:#f8e7e0;
  }
  .site *{box-sizing:border-box}
  .site a{color:inherit;text-decoration:none}
  .site button{font-family:inherit}
  .annot{font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;color:#a33828;letter-spacing:.03em;line-height:1.4}
  .annot.ok{color:#3c7b20}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx?v=3"></script>

<script type="text/babel" data-presets="env,react">
const { useState, Fragment } = React;

/* ═════════════════════════════════════════════════════════════════════════
   Shared bits — same as the other mockups file
   ═════════════════════════════════════════════════════════════════════════ */
const TRACK_LINKS = ['My List', 'Compare', 'Pipeline', 'Timeline', 'Apps', 'Profs', 'Refs', 'Archive'];
const BROWSE_LINKS = ['Programs', 'Internships', 'Jobs', 'Service'];
const WRITE_LINKS = ['Materials', 'Writing', 'Outreach', 'Packet'];

const ICON_COMMON = { width: 16, height: 16, viewBox: '0 0 18 18', fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' };

/* A small, stroke-based icon set — 15 glyphs at 1.5px stroke, 18px viewBox,
   designed to match the site's hairline aesthetic. Replaces emoji nav glyphs. */
const Icon = {
  home: () => <svg {...ICON_COMMON}><path d="M3 9 9 3l6 6v6a1 1 0 0 1-1 1h-3v-4H7v4H4a1 1 0 0 1-1-1V9z"/></svg>,
  search: () => <svg {...ICON_COMMON}><circle cx="8" cy="8" r="4.5"/><path d="m11.5 11.5 3 3"/></svg>,
  star: () => <svg {...ICON_COMMON}><path d="M9 2.5 10.6 6.8l4.6.3-3.5 3 1.1 4.5L9 12.3l-3.8 2.3 1.1-4.5-3.5-3 4.6-.3z"/></svg>,
  compare: () => <svg {...ICON_COMMON}><rect x="2.5" y="3" width="5" height="12" rx="1"/><rect x="10.5" y="3" width="5" height="12" rx="1"/></svg>,
  kanban: () => <svg {...ICON_COMMON}><rect x="2.5" y="3" width="3" height="10" rx=".5"/><rect x="7.5" y="3" width="3" height="6" rx=".5"/><rect x="12.5" y="3" width="3" height="8" rx=".5"/></svg>,
  calendar: () => <svg {...ICON_COMMON}><rect x="2.5" y="4" width="13" height="11" rx="1"/><path d="M2.5 7.5h13M6 2.5v3M12 2.5v3"/></svg>,
  file: () => <svg {...ICON_COMMON}><path d="M4 2.5h6l4 4V15a.5.5 0 0 1-.5.5h-9A.5.5 0 0 1 4 15V3a.5.5 0 0 1 0-.5z"/><path d="M10 2.5v4h4"/></svg>,
  person: () => <svg {...ICON_COMMON}><circle cx="9" cy="6.5" r="2.8"/><path d="M3.5 15.5c.6-2.7 2.9-4.5 5.5-4.5s4.9 1.8 5.5 4.5"/></svg>,
  pen: () => <svg {...ICON_COMMON}><path d="m3 15 1-3.5L11.5 4l3 3-7.5 7.5L3.5 15zM10 5.5l3 3"/></svg>,
  archive: () => <svg {...ICON_COMMON}><rect x="2.5" y="3.5" width="13" height="3" rx=".5"/><path d="M3.5 6.5V14a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5V6.5"/><path d="M7 9.5h4"/></svg>,
  cap: () => <svg {...ICON_COMMON}><path d="M1.5 6.5 9 3l7.5 3.5L9 10z"/><path d="M4.5 8.5V12c1.2 1.5 7.8 1.5 9 0V8.5"/></svg>,
  clipboard: () => <svg {...ICON_COMMON}><rect x="4" y="3" width="10" height="12.5" rx=".5"/><rect x="6" y="2" width="6" height="2.5" rx=".4" fill="currentColor" stroke="none"/><path d="M6.5 9h5M6.5 12h3"/></svg>,
  briefcase: () => <svg {...ICON_COMMON}><rect x="2.5" y="6" width="13" height="8.5" rx="1"/><path d="M6 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M2.5 10h13"/></svg>,
  leaf: () => <svg {...ICON_COMMON}><path d="M3 15c0-6 4-11 12-12-.5 8-5 12-11 12.5"/><path d="M3 15c2.5-3 5-5 8-7"/></svg>,
  book: () => <svg {...ICON_COMMON}><path d="M3 4a1 1 0 0 1 1-1h4a2 2 0 0 1 2 2v10a2 2 0 0 0-2-2H4a1 1 0 0 1-1-1z"/><path d="M15 4a1 1 0 0 0-1-1h-4a2 2 0 0 0-2 2v10a2 2 0 0 1 2-2h4a1 1 0 0 0 1-1z"/></svg>,
  printer: () => <svg {...ICON_COMMON}><path d="M5 6V3h8v3M3 6h12a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-2v2H5v-2H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z"/><circle cx="13" cy="9" r=".5" fill="currentColor"/></svg>,
  inbox: () => <svg {...ICON_COMMON}><path d="m2.5 9 2-5h9l2 5v5.5a.5.5 0 0 1-.5.5h-12a.5.5 0 0 1-.5-.5z"/><path d="M2.5 9h4l1 1.5h3L11.5 9h4"/></svg>,
};

function GroupLabel({ kind, children }) {
  const c = { track: ['var(--teal-bg)', 'var(--teal-t)'], browse: ['var(--blue-bg)', 'var(--blue)'], write: ['var(--amber-bg)', 'var(--amber-t)'] };
  const [bg, fg] = c[kind];
  return <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', padding: '3px 7px', borderRadius: 4, background: bg, color: fg, lineHeight: 1 }}>{children}</span>;
}

function NavLink({ children, active, icon }) {
  return (
    <a style={{
      fontSize: 12.5, fontWeight: 500,
      color: active ? 'var(--teal-t)' : 'var(--t3)',
      borderBottom: active ? '2px solid var(--teal)' : '2px solid transparent',
      padding: '8px 7px', whiteSpace: 'nowrap', display: 'inline-flex', alignItems: 'center', gap: 5,
    }}>{icon}{children}</a>
  );
}

/* Centered Option-A style header — reused on most page mockups so they all
   inherit the recommended header.  Pass `useIcons` to swap emoji glyphs for
   the SVG icon set; pass `serif` to render the brand wordmark in serif. */
function PageHeader({ activeGroup = 'track', activeLink = null, useIcons = false, serif = false, warm = false }) {
  const groups = {
    track: { label: 'Track', kind: 'track', links: TRACK_LINKS, icons: [Icon.star, Icon.compare, Icon.kanban, Icon.calendar, Icon.file, Icon.person, Icon.pen, Icon.archive] },
    browse: { label: 'Browse', kind: 'browse', links: BROWSE_LINKS, icons: [Icon.cap, Icon.clipboard, Icon.briefcase, Icon.leaf] },
    write: { label: 'Write', kind: 'write', links: WRITE_LINKS, icons: [Icon.book, Icon.pen, Icon.inbox, Icon.printer] },
  };
  return (
    <nav style={{ background: 'var(--bg)', borderBottom: '.5px solid var(--bd)', padding: '0 16px' }}>
      <div style={{ maxWidth: 1040, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 12, height: 44 }}>
        <a style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 130 }}>
          <div style={{ width: 26, height: 26, borderRadius: 6, background: 'var(--teal-t)', color: '#fff', fontWeight: 700, fontSize: 11, display: 'flex', alignItems: 'center', justifyContent: 'center', letterSpacing: '.02em' }}>WN</div>
          <div style={{ fontSize: serif ? 15 : 13, fontFamily: serif ? 'var(--serif)' : 'inherit', fontWeight: serif ? 500 : 600, color: 'var(--t1)', letterSpacing: serif ? '-.005em' : 0 }}>What's Next</div>
        </a>
        <div style={{ flex: 1, display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
          {Object.entries(groups).flatMap(([key, g], gi) => {
            const items = [];
            if (gi > 0) items.push(<span key={key + '-div'} style={{ width: 1, height: 16, background: 'var(--bd)', margin: '0 8px' }} />);
            items.push(<GroupLabel key={key + '-gl'} kind={g.kind}>{g.label}</GroupLabel>);
            items.push(
              <div key={key + '-links'} style={{ display: 'flex', marginLeft: 4 }}>
                {g.links.map((l, i) => {
                  const IconC = g.icons[i];
                  return <NavLink key={i} active={activeGroup === key && activeLink === l} icon={useIcons ? <IconC /> : null}>{l}</NavLink>;
                })}
              </div>
            );
            return items;
          })}
        </div>
        <div style={{ minWidth: 130, display: 'flex', justifyContent: 'flex-end', gap: 4 }}>
          <button style={{ fontSize: 12.5, padding: '6px 11px', border: '.5px solid var(--bds)', borderRadius: 999, background: 'transparent', color: 'var(--t2)', display: 'flex', alignItems: 'center', gap: 5 }}>{useIcons ? <Icon.search/> : '🔍'} Search</button>
          <button style={{ width: 30, height: 30, border: 'none', background: 'transparent', borderRadius: 6, color: 'var(--t2)', fontSize: 14 }}>🌙</button>
        </div>
      </div>
    </nav>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   06.  DOCUMENT vs CABINET WIDTH SPLIT
   ═════════════════════════════════════════════════════════════════════════ */

function DocCabinetSplit() {
  return (
    <div className="site" style={{ width: '100%', height: '100%', overflow: 'auto', padding: '16px 0', background: '#e8e6e0' }}>
      <PageHeader />
      <div style={{ display: 'grid', gridTemplateColumns: '720px 1040px', justifyContent: 'center', gap: 32, padding: '24px 16px', alignItems: 'start' }}>
        {/* Document — 720px */}
        <div>
          <div className="annot" style={{ marginBottom: 6 }}>DOCUMENT · 720 px · serif body, reading rhythm</div>
          <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '28px 36px', minHeight: 480 }}>
            <div style={{ fontSize: 11, fontWeight: 500, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--teal-t)', marginBottom: 6 }}>Write · Outreach</div>
            <div style={{ fontSize: 32, fontFamily: 'var(--serif)', fontWeight: 500, letterSpacing: '-.015em', color: 'var(--t1)', lineHeight: 1.1, marginBottom: 10 }}>Statement of purpose</div>
            <div style={{ fontSize: 14, color: 'var(--t2)', marginBottom: 22, fontStyle: 'italic', fontFamily: 'var(--serif)' }}>A canonical draft Erin tunes program-by-program.</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 16, lineHeight: 1.7, color: 'var(--t1)' }}>
              <p style={{ marginBottom: 14 }}>The afternoon Hurricane Helene crossed the Pigeon River, I was four miles upstream collecting routine sediment cores for an undergraduate water-quality class. Three days later, the same reach was unrecognizable&mdash;<span style={{ background: '#e8efff', color: '#185fa5', padding: '0 3px', fontStyle: 'italic' }}>[program-specific question]</span>&hellip;</p>
              <p style={{ marginBottom: 14 }}>My capstone project followed those reach changes through the next two seasons. Using paired GIS suitability analysis and trace-metal core data, I traced legacy lead and zinc signatures from the upstream Champion paper mill basin&hellip;</p>
            </div>
          </div>
        </div>

        {/* Cabinet — 1040px */}
        <div>
          <div className="annot" style={{ marginBottom: 6 }}>CABINET · 1040 px · row-style cards, denser</div>
          <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '24px 28px', minHeight: 480 }}>
            <div style={{ fontSize: 11, fontWeight: 500, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--teal-t)', marginBottom: 6 }}>Browse</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--t1)', letterSpacing: '-.02em', marginBottom: 4 }}>Funded Graduate Programs</div>
            <div style={{ fontSize: 13.5, color: 'var(--t2)', marginBottom: 16 }}>17 current · 12 next cycle</div>

            <div style={{ display: 'flex', gap: 5, marginBottom: 14, flexWrap: 'wrap' }}>
              {['All', 'Closing &lt; 30d', 'Mountain West', 'Southeast', 'Wetlands', 'GIS', 'Wildlife'].map((t, i) => (
                <span key={t} dangerouslySetInnerHTML={{ __html: t }} style={{ fontSize: 11.5, padding: '3px 11px', borderRadius: 999, border: i === 0 ? 'none' : '1px solid var(--bds)', background: i === 0 ? 'var(--teal)' : 'transparent', color: i === 0 ? '#fff' : 'var(--t2)' }} />
              ))}
            </div>

            {[
              ['MS — Wetland Carbon Dynamics', 'University of Tennessee · Knoxville, TN', '28d', '#993c1d', 'var(--red-bg)'],
              ['MS — Trace Metals & Geomorphology', 'Virginia Tech · Blacksburg, VA', '40d', 'var(--amber-t)', 'var(--amber-bg)'],
              ['MS — Coastal Wildlife Ecology', 'University of Florida · Gainesville', '62d', 'var(--amber-t)', 'var(--amber-bg)'],
              ['MS — Stream Restoration', 'Colorado State · Fort Collins', '95d', 'var(--teal-t)', 'var(--teal-bg)'],
            ].map(([t, o, urg, c, bg]) => (
              <div key={t} style={{ display: 'grid', gridTemplateColumns: '1fr 100px 90px 90px', alignItems: 'center', gap: 14, padding: '10px 14px', borderBottom: '.5px solid var(--bd)' }}>
                <div>
                  <div style={{ fontSize: 14.5, fontWeight: 600, color: 'var(--t1)' }}>{t}</div>
                  <div style={{ fontSize: 12, color: 'var(--t3)' }}>{o}</div>
                </div>
                <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: bg, color: c, justifySelf: 'start' }}>{urg} left</span>
                <span style={{ fontSize: 12, color: 'var(--t3)' }}>$30k/yr</span>
                <button style={{ fontSize: 12, fontWeight: 500, padding: '5px 12px', borderRadius: 999, border: '.5px solid var(--bds)', background: 'transparent', color: 'var(--t2)' }}>Details →</button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   07.  CARD DISCIPLINE — 5+ pills vs. 2 colored + neutral chips
   ═════════════════════════════════════════════════════════════════════════ */

function CardDiscipline({ variant }) {
  const noisy = variant === 'before';
  return (
    <div className="site" style={{ width: '100%', height: '100%', padding: 24, position: 'relative', background: 'var(--bg3)' }}>
      <div className="annot" style={{ marginBottom: 8, color: noisy ? '#a33828' : '#3c7b20' }}>
        {noisy ? 'BEFORE · five hues fight for attention' : 'AFTER · two colored pills + neutral chips'}
      </div>
      <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '16px 20px', borderLeft: '3px solid #d63a1f', maxWidth: 640 }}>
        <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--t1)', marginBottom: 3 }}>MS Position — Wetland Carbon Dynamics</div>
        <div style={{ fontSize: 13, color: 'var(--t3)', marginBottom: 10 }}>University of Tennessee · Knoxville, TN</div>
        <div style={{ fontSize: 13, color: 'var(--t2)', marginBottom: 12 }}>Deadline: <strong style={{ color: '#993c1d' }}>Dec 15, 2026 · 28 days left</strong></div>

        {noisy ? (
          /* Before — five hues, all loud */
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: '#d63a1f', color: '#fff' }}>✨ NEW</span>
            <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>✓ Saved</span>
            <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: 'var(--red-bg)', color: '#993c1d' }}>28d left</span>
            <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>Graduate</span>
            <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--amber-bg)', color: 'var(--amber-t)' }}>★ Strong fit</span>
            <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--blue-bg)', color: 'var(--blue)' }}>Southeast</span>
            <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--purple-bg)', color: 'var(--purple-t)' }}>Funded</span>
          </div>
        ) : (
          /* After — two color, rest demoted to neutral chips */
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
              {/* Two colored — state pills only */}
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: '#d63a1f', color: '#fff' }}>NEW</span>
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: 'var(--red-bg)', color: '#993c1d' }}>28d left</span>
            </div>
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
              {/* Everything else — neutral chips, mono-tone */}
              {['Graduate', '★ Strong fit', 'Southeast', 'Funded', 'Saved'].map(t => (
                <span key={t} style={{ fontSize: 11, fontWeight: 500, padding: '2px 9px', borderRadius: 999, background: 'var(--bg2)', color: 'var(--t2)', border: '.5px solid var(--bd)' }}>{t}</span>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ marginTop: 18, fontSize: 12, color: 'var(--t2)', lineHeight: 1.6, maxWidth: 640, fontFamily: 'IBM Plex Mono, ui-monospace, monospace' }}>
        {noisy
          ? 'Five hues per card. The eye can\'t find what to read first. Every pill is equally loud — so nothing is loud.'
          : 'Reserve color for STATE: new, urgency, saved. Reduce everything else to neutral chips. The two reds now pop because they\'re the only chroma on the card.'}
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   08.  ICON SET — replace nav emoji
   ═════════════════════════════════════════════════════════════════════════ */

function IconSetArtboard() {
  const all = [
    ['home', 'Home', Icon.home], ['search', 'Search', Icon.search],
    ['star', 'My List', Icon.star], ['compare', 'Compare', Icon.compare],
    ['kanban', 'Pipeline', Icon.kanban], ['calendar', 'Timeline', Icon.calendar],
    ['file', 'Apps', Icon.file], ['person', 'Profs', Icon.person],
    ['pen', 'Refs / Writing', Icon.pen], ['archive', 'Archive', Icon.archive],
    ['cap', 'Programs', Icon.cap], ['clipboard', 'Internships', Icon.clipboard],
    ['briefcase', 'Jobs', Icon.briefcase], ['leaf', 'Service', Icon.leaf],
    ['book', 'Materials', Icon.book], ['inbox', 'Outreach', Icon.inbox],
    ['printer', 'Packet', Icon.printer],
  ];
  return (
    <div className="site" style={{ width: '100%', height: '100%', padding: 22, overflow: 'auto' }}>
      <div className="annot ok" style={{ marginBottom: 14 }}>One stroke weight (1.5 px), one viewBox (18), one color (currentColor)</div>

      {/* The set */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', gap: 12, marginBottom: 22 }}>
        {all.map(([key, label, I]) => (
          <div key={key} style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 8, padding: '14px 8px 10px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
            <div style={{ color: 'var(--t1)', width: 22, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><I /></div>
            <div style={{ fontSize: 11, color: 'var(--t3)', fontFamily: 'IBM Plex Mono, ui-monospace, monospace', letterSpacing: '.02em' }}>{key}</div>
          </div>
        ))}
      </div>

      {/* Side-by-side nav comparison */}
      <div className="annot" style={{ marginBottom: 6 }}>BEFORE · emoji</div>
      <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 8, padding: '0 12px', marginBottom: 14 }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '0 2px', padding: '6px 0' }}>
          <span style={{ fontSize: 13, fontWeight: 600, padding: '6px 8px 6px 0', borderRight: '.5px solid var(--bd)', marginRight: 4 }}>🏠 Home</span>

                <div key={n} style={{ fontSize: 12.5, padding: '6px 0', borderBottom: '.5px solid var(--bd)' }}>
                  <div style={{ color: 'var(--t1)', fontWeight: 500 }}>{n}</div>
                  <div style={{ color: c, fontSize: 11.5, marginTop: 2 }}>{s}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
