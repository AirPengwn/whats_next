.ip-intern{background:var(--blue-bg);color:var(--blue)}

.body-text{display:none}

.item-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-top:.25rem}

.browse-actions{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}

.b-toggle:hover{color:var(--t1)}
.search-input{font-size:13px;padding:8px 12px;border-radius:var(--r1);border:1px solid var(--bds);background:var(--bg);color:var(--t1);width:100%;font-family:var(--fn);margin-bottom:.85rem}

.tip{border-left:3px solid var(--teal);background:var(--bg2);padding:.75rem 1rem;margin-bottom:1rem;border-radius:0 var(--r1) var(--r1) 0;font-size:13px;color:var(--t2);line-height:1.6}
.empty{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r2);padding:2.5rem;text-align:center}
.empty-icon{font-size:32px;margin-bottom:.65rem}
.empty-title{font-size:15px;font-weight:500;margin-bottom:.35rem}
.empty-body{font-size:13px;color:var(--t2);line-height:1.65}

.gnav-home{font-size:12px;font-weight:600;color:var(--t1);text-decoration:none;padding:8px 8px 8px 0;white-space:nowrap;border-right:.5px solid var(--bd);margin-right:2px;flex-shrink:0}
.gnav-home:hover{color:var(--teal-t)}
.gnav-link{font-size:11px;font-weight:500;color:var(--t3);text-decoration:none;padding:8px 5px;white-space:nowrap;border-bottom:2px solid transparent;transition:color .12s,border-color .12s;flex-shrink:0}
.gnav-link:hover{color:var(--t1)}
.gnav-link.active{color:var(--teal-t);border-bottom-color:var(--teal)}
.gnav-toggle{flex-shrink:0;width:34px;height:34px;margin-left:8px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;border-radius:6px;font-family:var(--fn);font-size:14px;line-height:1;transition:background .12s,border-color .12s}
.gnav-toggle:hover{background:var(--bg3);border-color:var(--bds);color:var(--t1)}

/* ════════════════════════════════════
   THEME VARIABLES — What's Next for Erin
   Light: Medium grey scale palette
   Dark: Forest green palette
   ════════════════════════════════════ */

/* Light mode base */
:root {
  /* Grey scale (Medium palette) */
  --bg:   #FAFAFA;   /* grey-50  — card white */
  --bg2:  #F5F5F5;   /* grey-100 — subtle areas */
  --bg3:  #EEEEEE;   /* grey-200 — page background */
  --t1:   #212121;   /* grey-900 — primary text */
  --t2:   #424242;   /* grey-800 — secondary text */
  --t3:   #757575;   /* grey-600 — muted text */
  --bd:   rgba(0,0,0,0.10);
  --bds:  rgba(0,0,0,0.22);
  /* Shared */
  --r1:8px;--r2:12px;
  --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  /* Green accents (from original palette) */
  --teal:#4e9836;--teal-bg:#eaf3e5;--teal-t:#3c7b20;
  --blue:#3a7878;--blue-bg:#e5f0f0;
  --amber:#8a6f00;--amber-bg:#f5f0db;--amber-t:#6b5500;
  --red:#993c1d;--red-bg:#faece7;--red-t:#993c1d;
  --purple-bg:#e8e4fe;--purple-t:#4c3bc4;
}

/* System dark mode (auto) */
@media(prefers-color-scheme:dark) {
  :root {
    --bg:#1c2018;--bg2:#242b1e;--bg3:#18201a;
    --t1:#f0ede0;--t2:#c0c4a8;--t3:#9dc8c8;
    --bd:rgba(157,200,200,0.15);--bds:rgba(157,200,200,0.28);
    --teal-bg:#2a3d22;--teal-t:#8fc87a;
    --blue-bg:#1e3535;--amber-bg:#3d3510;--amber-t:#d4c47a;
    --red-bg:#3d1510;--red-t:#f5a490;
    --purple-bg:#2d2563;--purple-t:#b5abfa;
  }
}

/* Manual toggle — must come LAST so it overrides both :root and @media */
html.dark {
  --bg:#1c2018;--bg2:#242b1e;--bg3:#18201a;
  --t1:#f0ede0;--t2:#c0c4a8;--t3:#9dc8c8;
  --bd:rgba(157,200,200,0.15);--bds:rgba(157,200,200,0.28);
  --teal-bg:#2a3d22;--teal-t:#8fc87a;
  --blue-bg:#1e3535;--amber-bg:#3d3510;--amber-t:#d4c47a;
  --red-bg:#3d1510;--red-t:#f5a490;
  --purple-bg:#2d2563;--purple-t:#b5abfa;
}
/* Override light mode when .dark is set (belt AND suspenders) */
html:not(.dark) {
  --bg:#FAFAFA;--bg2:#F5F5F5;--bg3:#EEEEEE;
  --t1:#212121;--t2:#424242;--t3:#757575;
  --bd:rgba(0,0,0,0.10);--bds:rgba(0,0,0,0.22);
  --teal-bg:#eaf3e5;--teal-t:#3c7b20;
  --blue-bg:#e5f0f0;--amber-bg:#f5f0db;--amber-t:#6b5500;
  --red-bg:#faece7;--red-t:#993c1d;
  --purple-bg:#e8e4fe;--purple-t:#4c3bc4;
}
/* Rich detail panel */
.item-detail{display:none;margin-top:.75rem;padding:.85rem 1rem;background:var(--bg2);border-radius:var(--r1);border:.5px solid var(--bd)}
.item-detail.open{display:block}
.id-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;background:var(--teal-bg);color:var(--teal-t);margin-bottom:.55rem}
.id-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin:.6rem 0 .2rem}
.id-body{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:.5rem}
.id-meta-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.id-meta-item{font-size:12px;color:var(--t2)}
.id-meta-item strong{color:var(--t1);font-weight:600}
.id-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.5rem}
.id-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;background:var(--teal-bg);color:var(--teal-t)}
.id-link{display:inline-block;font-size:12px;font-weight:500;color:var(--teal-t);text-decoration:none;margin-top:.4rem;padding:4px 10px;border:1px solid var(--teal);border-radius:6px}

@media print {
  .global-nav, .gnav-inner, button, .add-btn, .del-btn, .save-btn,
  .mode-tabs, .list-filters, .browse-actions, .item-actions, .note-area,
  .saved-flash, .app-row, .app-actions, footer, .footer { display:none!important }
  body { background:#fff!important; color:#000!important }
  .page { max-width:100%!important; padding:0!important }
  .page-header { border-bottom:1px solid #ccc!important }
  .item-card, .app-card, .prof-card, .browse-card { 
    border:1px solid #ccc!important; break-inside:avoid; margin-bottom:.5rem!important }
}

<script>
(function(){
  var saved=localStorage.getItem('erin_theme');
  var prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(saved==='dark'||(!saved&&prefersDark)) document.documentElement.classList.add('dark');
  function upBtn(){var b=document.getElementById('theme-toggle');if(b)b.innerHTML=document.documentElement.classList.contains('dark')?'&#9728;':'&#127769;';}
  document.addEventListener('DOMContentLoaded',upBtn);
  window.__toggleTheme=function(){var d=document.documentElement.classList.toggle('dark');localStorage.setItem('erin_theme',d?'dark':'light');upBtn();};
})();
</script>

// Shared rationale modal — also lives on the Applications page. cb(null) on cancel.
window.showArchiveModal=function(opts, cb){
  var TAGS=['too far','no funding','wrong research fit','missed deadline','better option','not competitive','other'];
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;font-family:var(--fn,sans-serif)';
  var modal=document.createElement('div');
  modal.style.cssText='background:var(--bg);border:.5px solid var(--bd);border-radius:12px;max-width:440px;width:100%;padding:1.25rem 1.35rem;box-shadow:0 8px 32px rgba(0,0,0,.28);color:var(--t1)';
  var actionVerb={removed:'Remove from list',declined:'Mark as Declined',waitlisted:'Mark as Waitlisted',accepted:'Mark as Accepted'}[opts.action]||'Archive';
  var t=document.createElement('div');
  t.style.cssText='font-size:14px;font-weight:600;color:var(--t1);margin-bottom:.35rem;line-height:1.4';
  t.textContent=actionVerb+': '+(opts.title||'this item');
  modal.appendChild(t);
  if(opts.org){
    var og=document.createElement('div'); og.style.cssText='font-size:12px;color:var(--t3);margin-bottom:.85rem'; og.textContent=opts.org; modal.appendChild(og);
  }
  var hint=document.createElement('div');
  hint.style.cssText='font-size:12px;color:var(--t2);margin-bottom:.6rem;line-height:1.5';
  hint.textContent='A one-line rationale helps future-Erin understand the past. Optional, but recommended.';
  modal.appendChild(hint);
  var tagsRow=document.createElement('div'); tagsRow.style.cssText='display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem';
  var pickedTags={};
  TAGS.forEach(function(tg){
    var btn=document.createElement('button'); btn.type='button'; btn.textContent=tg;
    btn.style.cssText='font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;border:1px solid var(--bds);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit';
    btn.onclick=function(){
      pickedTags[tg]=!pickedTags[tg];
      btn.style.background=pickedTags[tg]?'var(--teal-bg)':'transparent';
      btn.style.color=pickedTags[tg]?'var(--teal-t)':'var(--t2)';
      btn.style.borderColor=pickedTags[tg]?'var(--teal)':'var(--bds)';
    };
    tagsRow.appendChild(btn);
  });
  modal.appendChild(tagsRow);
  var input=document.createElement('textarea');
  input.placeholder='Brief reason (e.g. "Lab too small, advisor not taking students for Fall 2027")';
  input.style.cssText='width:100%;min-height:60px;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid var(--bds);background:var(--bg2);color:var(--t1);font-family:inherit;resize:vertical;box-sizing:border-box';
  modal.appendChild(input);
  var btnRow=document.createElement('div'); btnRow.style.cssText='display:flex;gap:.6rem;justify-content:flex-end;margin-top:.85rem;flex-wrap:wrap';
  var cancel=document.createElement('button'); cancel.type='button'; cancel.textContent='Cancel';
  cancel.style.cssText='font-size:12px;padding:6px 14px;border-radius:6px;border:.5px solid var(--bds);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit';
  cancel.onclick=function(){ document.body.removeChild(overlay); cb(null); };
  var skip=document.createElement('button'); skip.type='button'; skip.textContent='Skip reason';
  skip.style.cssText='font-size:12px;padding:6px 14px;border-radius:6px;border:.5px solid var(--bds);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:inherit';
  skip.onclick=function(){ document.body.removeChild(overlay); cb({reason:'',tags:[],itemId:opts.itemId,source:opts.source,action:opts.action,itemTitle:opts.title,itemOrg:opts.org}); };
  var save=document.createElement('button'); save.type='button'; save.textContent='Save & '+actionVerb.toLowerCase();
  save.style.cssText='font-size:12px;font-weight:500;padding:6px 16px;border-radius:6px;border:none;background:var(--teal);color:#fff;cursor:pointer;font-family:inherit';
  save.onclick=function(){
    var tags=Object.keys(pickedTags).filter(function(k){return pickedTags[k];});
    document.body.removeChild(overlay);
    cb({reason:input.value.trim(),tags:tags,itemId:opts.itemId,source:opts.source,action:opts.action,itemTitle:opts.title,itemOrg:opts.org});
  };
  btnRow.appendChild(cancel); btnRow.appendChild(skip); btnRow.appendChild(save);
  modal.appendChild(btnRow);
  overlay.appendChild(modal); document.body.appendChild(overlay);
  setTimeout(function(){input.focus();},50);

function setMode(m){
  document.getElementById('mode-list').style.display=m==='list'?'block':'none';
  document.getElementById('mode-browse').style.display=m==='browse'?'block':'none';
  document.getElementById('tab-list').classList.toggle('active',m==='list');

  if(m==='browse') renderBrowse();
}

function el(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }

function catCls(t){
  if(!t) return 'ip-next';
  if(t.indexOf('Graduate')>-1) return 'ip-grad';
  if(t.indexOf('Internship')>-1) return 'ip-intern';
  if(t.indexOf('Career')>-1) return 'ip-job';
  if(t.indexOf('Service')>-1) return 'ip-service';
  return 'ip-next';
}

function catLbl(c){
  if(!c) return '';
  var next=c.indexOf('Next')>-1;
  if(c.indexOf('Graduate')>-1)   return next?'Grad - Next':'Grad Program';
  if(c.indexOf('Internship')>-1) return next?'Intern - Next':'Internship';
  if(c.indexOf('Career')>-1)     return next?'Jobs - Next':'Career';
  if(c.indexOf('Service')>-1)    return next?'Service - Next':'Service';
  return c;
}

function buildFilters(elId, cur, fn){
  var wrap=document.getElementById(elId); if(!wrap) return; wrap.innerHTML='';
  CATS.forEach(function(c){
    var b=el('button','f-btn'+(c===cur?' on':''),c);
    b.onclick=function(){ fn(c); };
    wrap.appendChild(b);
  });
}


// ── Merge saved item with ALL array to get enriched fields (url, pay, etc.) ──
function mergeWithAll(it){
  var match = ALL.find(function(a){ return a.id === it.id; });
  if(!match) return it;
  var merged = Object.assign({}, match, it); // saved fields override ALL (preserve notes, _done etc.)
  // But for enrichment fields missing from saved, take from ALL
  var enrichFields = ['url','url_label','url2','url2_label','pay','location','benefits','stipend','extbody','contact'];
  enrichFields.forEach(function(f){
    if(!merged[f] && match[f]) merged[f] = match[f];
  });
  return merged;
}

function makeListCard(it){
  it=mergeWithAll(it);
  var card=el('div','item-card'+(it._done?' done':''));
  card.id='card-'+it.id;

  var row=el('div','item-row1');

  var chk=document.createElement('input');
  chk.type='checkbox'; chk.className='item-check'; chk.checked=!!it._done;
  chk.onchange=function(){ toggleDone(it.id,chk.checked); };
  row.appendChild(chk);

  var main=el('div','item-main');
  main.appendChild(el('div','item-title',it.title));
  main.appendChild(el('div','item-org',it.org));

  var pills=el('div','item-pills');
  var cp=el('span','ip '+catCls(it.cat||it.type)); cp.textContent=catLbl(it.cat||it.type); pills.appendChild(cp);
  if(it.badge){ var bp=el('span','ip ip-next',it.badge); pills.appendChild(bp); }
  (it.pills||[]).slice(0,3).forEach(function(p){ pills.appendChild(el('span','ip ip-next',p)); });
  main.appendChild(pills);

  var meta=el('div','item-meta');
  if(it.deadline){ var dm=el('span'); dm.innerHTML='<span class="im-lbl">Deadline:</span> '+it.deadline; meta.appendChild(dm); }
  if(it.start){    var sm=el('span'); sm.innerHTML='<span class="im-lbl">Start:</span> '+it.start; meta.appendChild(sm); }
  main.appendChild(meta);

  if(it._note){ var nd=el('div','note-display','Note: '+it._note); main.appendChild(nd); }

  // ── Rich detail panel ──
  var detail=el('div','item-detail'); detail.id='detail-'+it.id;

  // Badge
  if(it.badge){ var ib=el('div','id-badge',it.badge); detail.appendChild(ib); }

  // Deadline + Start row
  if(it.deadline||it.start){
    var mr=el('div','id-meta-row');
    if(it.deadline){ var di=el('div','id-meta-item'); di.innerHTML='<strong>Deadline:</strong> '+it.deadline; mr.appendChild(di); }
    if(it.start){ var si=el('div','id-meta-item'); si.innerHTML='<strong>Start:</strong> '+it.start; mr.appendChild(si); }
    detail.appendChild(mr);
  }

  // Body text
  if(it.body){
    var bl=el('div','id-section-label','About this opportunity'); detail.appendChild(bl);
    var bd=el('div','id-body',it.body); detail.appendChild(bd);
  }

  // Pills
  if(it.pills&&it.pills.length){
    var pl=el('div','id-section-label','Focus areas'); detail.appendChild(pl);
    var pd=el('div','id-pills');
    it.pills.forEach(function(p){ pd.appendChild(el('span','id-pill',p)); });
    detail.appendChild(pd);
  }

  // ── Pay / Location / Benefits / Stipend ──
  if(it.pay||it.location||it.benefits||it.stipend){
    detail.appendChild(el('div','id-section-label','Compensation & location'));
    var mr2=el('div','id-meta-row');
    if(it.pay){ var pi=el('div','id-meta-item'); pi.innerHTML='<strong>Pay:</strong> '+it.pay; mr2.appendChild(pi); }
    if(it.stipend){ var sti=el('div','id-meta-item'); sti.innerHTML='<strong>Stipend:</strong> '+it.stipend; mr2.appendChild(sti); }
    if(it.location){ var li2=el('div','id-meta-item'); li2.innerHTML='<strong>Location:</strong> '+it.location; mr2.appendChild(li2); }
    if(it.benefits){ var bi=el('div','id-meta-item'); bi.innerHTML='<strong>Benefits:</strong> '+it.benefits; mr2.appendChild(bi); }
    detail.appendChild(mr2);
  }
  // ── Extended detail ──
  if(it.extbody){ detail.appendChild(el('div','id-section-label','Additional detail')); var eb=el('div','id-body',it.extbody); eb.style.fontSize='12px'; detail.appendChild(eb); }
  if(it.contact){ detail.appendChild(el('div','id-section-label','How to apply / contact')); var cb=el('div','id-body',it.contact); cb.style.fontSize='12px'; detail.appendChild(cb); }
  // ── Links ──
  var lnkDiv=document.createElement('div'); lnkDiv.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:.5rem';
  if(it.url){ var al=document.createElement('a'); al.className='id-link id-link-primary'; al.href=it.url; al.target='_blank'; al.innerHTML='&#128279; '+(it.url_label||'Apply / View posting')+' &rarr;'; lnkDiv.appendChild(al); }
  if(it.url2){ var al2=document.createElement('a'); al2.className='id-link'; al2.href=it.url2; al2.target='_blank'; al2.innerHTML='&#128279; '+(it.url2_label||'More info')+' &rarr;'; lnkDiv.appendChild(al2); }
  if(it.src){ var sl=document.createElement('a'); sl.className='id-link'; sl.href=it.src; sl.target='_blank'; sl.textContent='Open '+(it.src_label||'source page')+' →'; lnkDiv.appendChild(sl); }
  if(lnkDiv.children.length) detail.appendChild(lnkDiv);
  // ── Source label ──
  detail.appendChild(el('div','id-section-label','Section'));
  var oi=el('div','id-meta-item'); oi.textContent=(it.src_label||it.cat||''); detail.appendChild(oi);

  main.appendChild(detail);

  var acts=el('div','item-actions');
  if(it.body||it.deadline||it.pills){
    var db=el('button','act-btn','Details'); db.onclick=function(){ detail.classList.toggle('open'); db.textContent=detail.classList.contains('open')?'Hide details':'Details'; }; acts.appendChild(db);
    acts.appendChild(el('span','act-sep',' · '));
  }
  var noteArea=el('div','note-area'); noteArea.id='note-'+it.id;
  var nb=el('button','act-btn','Note'); nb.onclick=function(){ noteArea.classList.toggle('open'); }; acts.appendChild(nb);
  acts.appendChild(el('span','act-sep',' · '));
  var ab=el('button','act-btn','→ Apps'); ab.title='Add to Application Tracker';
  ab.onclick=function(){ addToApps(it,ab); }; acts.appendChild(ab);

  var rb=el('button','act-remove','Remove');
  rb.onclick=function(){
    window.showArchiveModal(
      {title:it.title, org:it.org, source:'mylist', itemId:it.id, action:'removed'},
      function(result){
        if(!result) return; // cancelled — leave item in place
        logArchive(result);
        delItem(it.id); renderList();
        if(document.getElementById('mode-browse').style.display!=='none') renderBrowse();
      }
    );
  };
  acts.appendChild(rb);
  main.appendChild(acts);

  var ta=el('textarea','note-input'); ta.placeholder='Add a note...'; ta.value=it._note||'';
  var sb=el('button','note-save','Save note');
  sb.onclick=function(){ var m=load(); if(m[it.id]){m[it.id]._note=ta.value; save(m); push(m);} noteArea.classList.remove('open'); renderList(); };
  noteArea.appendChild(ta); noteArea.appendChild(el('br')); noteArea.appendChild(sb);
  main.appendChild(noteArea);

  row.appendChild(main); card.appendChild(row);
  return card;
}

function renderList(){
  var map=load(), all=Object.values(map), n=all.length;
  document.getElementById('count-pill').textContent=n+' saved';
  document.getElementById('tab-count').textContent=n?'('+n+')':'';
  document.getElementById('hero-sub').textContent=n
    ? n+' opportunit'+(n===1?'y':'ies')+' saved'
    : 'No items saved yet - use Browse All to add some';
  buildFilters('list-filters',mf,function(c){ mf=c; renderList(); });
  var items=mf==='All'?all:all.filter(function(it){ return it.type===mf; });
  var body=document.getElementById('list-body'); body.innerHTML='';
  if(!items.length){
    var e=el('div','empty');
    e.innerHTML='<div class="empty-icon">'+(n?'&#128269;':'&#128203;')+'</div>'
      +'<div class="empty-title">'+(n?'No items match':'Your list is empty')+'</div>'
      +'<div class="empty-body">'+(n?'Try a different category filter.':'Switch to Browse All to add opportunities.')+'</div>';
    body.appendChild(e); return;
  }
  var groups={};
  items.forEach(function(it){ var g=it.cat||it.type||'Other'; if(!groups[g])groups[g]=[]; groups[g].push(it); });
  Object.keys(groups).sort().forEach(function(g){
    var lbl=el('div','sec-label'); lbl.innerHTML=g+' <span class="sec-count">'+groups[g].length+'</span>'; body.appendChild(lbl);
    groups[g].forEach(function(it){ body.appendChild(makeListCard(it)); });
  });
}

function toggleDone(id,val){
  var m=load(); if(m[id]){ m[id]._done=val; save(m); push(m); }
  var c=document.getElementById('card-'+id); if(c) c.classList.toggle('done',val);
}

function renderBrowse(){
  var q=(document.getElementById('bs')||{}).value||''; q=q.toLowerCase();
  buildFilters('browse-filters',bf,function(c){ bf=c; renderBrowse(); });
  var items=ALL;
  if(bf!=='All') items=items.filter(function(it){ return it.type===bf; });
  if(q) items=items.filter(function(it){
    return (it.title+it.org+it.cat+(it.deadline||'')+(it.body||'')+(it.pills||[]).join(' ')).toLowerCase().indexOf(q)>-1;
  });
  var groups={};
  items.forEach(function(it){ var g=it.cat||'Other'; if(!groups[g])groups[g]=[]; groups[g].push(it); });
  var body=document.getElementById('browse-body'); body.innerHTML='';
  if(!items.length){
    body.innerHTML='<div class="empty"><div class="empty-icon">&#128269;</div><div class="empty-title">No results</div><div class="empty-body">Try a different search or filter.</div></div>';
    return;
  }
  Object.keys(groups).sort().forEach(function(g){
    var lbl=el('div','sec-label'); lbl.innerHTML=g+' <span class="sec-count">'+groups[g].length+'</span>'; body.appendChild(lbl);
    groups[g].forEach(function(it){
      it=mergeWithAll(it);
      var saved=has(it.id);
      var card=el('div','browse-card'+(saved?' is-saved':'')); card.id='bc-'+it.id;
      card.appendChild(el('div','browse-title',it.title));
      card.appendChild(el('div','browse-org',it.org));
      var meta=el('div','browse-meta');
      if(it.deadline){ var dm=el('span'); dm.innerHTML='<strong style="font-weight:500">Deadline:</strong> '+it.deadline; meta.appendChild(dm); }
      if(it.start){ if(it.deadline){meta.appendChild(el('span',null,' · '));} var sm=el('span'); sm.innerHTML='<strong style="font-weight:500">Start:</strong> '+it.start; meta.appendChild(sm); }
      card.appendChild(meta);
      // ── Rich browse detail panel ──
      var bd=el('div','item-detail'); bd.id='bb-'+it.id;
      if(it.deadline||it.start){
        var dm=el('div','browse-meta');
        if(it.deadline){ var ds=el('span'); ds.innerHTML='<strong style="font-weight:500">Deadline:</strong> '+it.deadline; dm.appendChild(ds); }
        if(it.start){ if(it.deadline)dm.appendChild(el('span',null,' · ')); var ss2=el('span'); ss2.innerHTML='<strong style="font-weight:500">Start:</strong> '+it.start; dm.appendChild(ss2); }
        bd.appendChild(dm);
      }
      if(it.desc){ var dd=el('div','browse-desc'); dd.textContent=it.desc; bd.appendChild(dd); }
      card.appendChild(bd);
      var sav=el('button','browse-save-btn'+(saved?' saved':''), saved?'✓ Saved':'+ Save');
      sav.onclick=function(){
        if(has(it.id)){ delItem(it.id); }
        else { addItem(it); }
        renderBrowse();
        renderList();
      };
      card.onclick=function(ev){ if(!ev.target.closest('.browse-save-btn')){ bd.classList.toggle('open'); } };
      card.appendChild(sav);
      body.appendChild(card);
    });
  });
}

function initPrimaryBtn(){
  var btn=document.getElementById('primary-btn');
  if(!btn) return;
  if(isPrimary()){
    btn.textContent='This is the primary device ✓';
    btn.style.cssText='font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;border:1px solid var(--teal-t);background:var(--teal-bg);color:var(--teal-t);cursor:default;font-family:var(--fn)';
  } else {
    btn.onclick=function(){ localStorage.setItem('erin_primary_device','1'); initPrimaryBtn(); };
    btn.textContent='Set as primary device';
    btn.style.cssText='font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;border:1px solid var(--bds);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--fn)';
  }
}

// JSONbin-first init
if(isPrimary()){
  var _m=load();
  renderList();
  if(Object.keys(_m).length>0){ push(_m); } // heartbeat: keep JSONbin current
  else { pullCloud(); }                       // recovery: localStorage empty, restore from cloud
} else {
  pullCloud(); // secondary: always read from cloud
}
renderBrowse();
initPrimaryBtn();
</script>

<script>
/* ── Sync indicator: appears at end of nav, updates on every sync ── */
(function(){
  function fmtAgo(ts){
    if(!ts) return 'never';
    var s=Math.floor((Date.now()-ts)/1000);
    if(s<5) return 'just now';
    if(s<60) return s+'s ago';
    var m=Math.floor(s/60); if(m<60) return m+'m ago';
    var h=Math.floor(m/60); if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }
  function render(){
    var el=document.getElementById('gnav-sync'); if(!el) return;
    var ts=parseInt(localStorage.getItem('erin_last_sync')||'0',10);
    el.textContent = ts ? '✓ Synced '+fmtAgo(ts) : '— not synced';
  }
  function setup(){
    var inner=document.querySelector('.gnav-inner');
    if(!inner || document.getElementById('gnav-sync')) return;
    var span=document.createElement('span');
    span.id='gnav-sync'; span.className='gnav-sync'; span.title='Last cloud sync';
    span.style.cssText='font-size:10px;color:var(--t3);padding:3px 8px;background:var(--bg2);border-radius:4px;white-space:nowrap;flex-shrink:0;margin-left:10px;border:.5px solid var(--bd)';
    inner.appendChild(span);
    render();
    setInterval(render,30000);
    window.addEventListener('erin-sync', render);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setup);
  else setup();
})();
</script>
