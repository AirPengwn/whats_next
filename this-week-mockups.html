<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Week — Mockups v2</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  .site{
    --bg:#FAFAFA;--bg2:#F5F5F5;--bg3:#EEEEEE;
    --t1:#212121;--t2:#424242;--t3:#757575;
    --bd:rgba(0,0,0,0.10);--bds:rgba(0,0,0,0.22);
    --r1:8px;--r2:12px;
    --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --teal:#4e9836;--teal-bg:#eaf3e5;--teal-t:#3c7b20;
    --blue:#3a7878;--blue-bg:#e5f0f0;
    --amber:#8a6f00;--amber-bg:#f5f0db;--amber-t:#6b5500;
    --red:#993c1d;--red-bg:#faece7;
    --purple-bg:#e8e4fe;--purple-t:#4c3bc4;
    font-family:var(--fn);background:var(--bg3);color:var(--t1);
    width:100%;height:100%;overflow:hidden;
  }
  .site *{box-sizing:border-box}
  .site a{color:inherit;text-decoration:none}
  .site button{font-family:inherit}

  .annot{position:absolute;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12.5px;color:#a33828;letter-spacing:.04em;font-weight:500;pointer-events:none;line-height:1.35}
  .annot::before{content:"";position:absolute;width:14px;height:1px;background:#a33828}
  .annot.r::before{right:100%;top:7px;margin-right:4px}
  .annot.l::before{left:100%;top:7px;margin-left:4px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx?v=3"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

/* ═════════════════════════════════════════════════════════════════════════
   Shared bits
   ═════════════════════════════════════════════════════════════════════════ */

const TRACK_LINKS = ['★ My List', '⚖ Compare', '📊 Pipeline', '📅 Timeline', '📄 Apps', '👤 Profs', '✎ Refs', '📁 Archive'];
const BROWSE_LINKS = ['🏛 Programs', '📋 Internships', '💼 Jobs', '🌳 Service'];
const WRITE_LINKS = ['📚 Materials', '✎ Writing', '✉ Outreach', '🖨 Packet'];

function GroupLabel({ kind, children }) {
  const colors = {
    track: ['var(--teal-bg)', 'var(--teal-t)'],
    browse: ['var(--blue-bg)', 'var(--blue)'],
    write: ['var(--amber-bg)', 'var(--amber-t)'],
  };
  const [bg, fg] = colors[kind];
  return <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', padding: '3px 7px', borderRadius: 4, background: bg, color: fg, lineHeight: 1 }}>{children}</span>;
}

function NavLink({ children, active }) {
  return (
    <a style={{
      fontSize: 12.5, fontWeight: 500,
      color: active ? 'var(--teal-t)' : 'var(--t3)',
      borderBottom: active ? '2px solid var(--teal)' : '2px solid transparent',
      padding: '8px 7px', whiteSpace: 'nowrap',
    }}>{children}</a>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   ORIGINAL GLOBAL NAV — for the type-scale before/after only
   ═════════════════════════════════════════════════════════════════════════ */

function GlobalNav({ scale = 'before' }) {
  const v = scale === 'before' ? { gl: 9, link: 11, home: 12 } : { gl: 10.5, link: 13, home: 13.5 };

  const links = [
    { label: '🏠 Home', home: true },
    { label: '🔍 Search' },
    { div: true },
    { gl: 'Track', cls: 't' },
    ...['★ My List', '⚖ Compare', '📊 Pipeline', '📅 Timeline', '📄 Apps', '👤 Profs', '✎ Refs', '📁 Archive'].map(l => ({ label: l, active: l === '📊 Pipeline' })),
    { div: true },
    { gl: 'Browse', cls: 'b' },
    ...BROWSE_LINKS.map(l => ({ label: l })),
    { div: true },
    { gl: 'Write', cls: 'w' },
    ...['📚 Materials', '✎ Writing', '🖨 Packet'].map(l => ({ label: l })),
  ];
  const glBg = { t: 'var(--teal-bg)', b: 'var(--blue-bg)', w: 'var(--amber-bg)' };
  const glClr = { t: 'var(--teal-t)', b: 'var(--blue)', w: 'var(--amber-t)' };

  return (
    <nav style={{ background: 'var(--bg)', borderBottom: '.5px solid var(--bd)', padding: '0 16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '0 2px', flexWrap: 'wrap' }}>
        {links.map((l, i) => {
          if (l.div) return <span key={i} style={{ width: 1, height: 16, background: 'var(--bd)', margin: '0 4px' }} />;
          if (l.gl) return <span key={i} style={{ fontSize: v.gl, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', padding: '2px 6px', borderRadius: 4, marginRight: 4, background: glBg[l.cls], color: glClr[l.cls], lineHeight: 1 }}>{l.gl}</span>;
          if (l.home) return <a key={i} style={{ fontSize: v.home, fontWeight: 600, color: 'var(--t1)', padding: '8px 8px 8px 0', borderRight: '.5px solid var(--bd)', marginRight: 2 }}>{l.label}</a>;
          return <a key={i} style={{ fontSize: v.link, fontWeight: 500, color: l.active ? 'var(--teal-t)' : 'var(--t3)', borderBottom: l.active ? '2px solid var(--teal)' : '2px solid transparent', padding: '8px 5px' }}>{l.label}</a>;
        })}
      </div>
    </nav>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   1.  TYPE SCALE — unchanged
   ═════════════════════════════════════════════════════════════════════════ */

function TypeScaleArtboard({ scale }) {
  const v = scale === 'before'
    ? { eyebrow: 11, title: 24, sub: 13, secLabel: 11, secCount: 11, cardTitle: 14, cardOrg: 12, cardMeta: 12, pill: 10 }
    : { eyebrow: 11, title: 30, sub: 15, secLabel: 13, secCount: 11, cardTitle: 16, cardOrg: 13, cardMeta: 13, pill: 11 };

  const ann = scale === 'after';

  return (
    <div className="site" style={{ position: 'relative', width: '100%', height: '100%' }}>
      <GlobalNav scale={scale} />
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '0 16px' }}>
        <div style={{ padding: '20px 0 14px', borderBottom: '.5px solid var(--bd)', marginBottom: 18, position: 'relative' }}>
          <div style={{ fontSize: v.eyebrow, fontWeight: 500, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--teal-t)', marginBottom: 4 }}>What's Next for Erin</div>
          <div style={{ fontSize: v.title, fontWeight: 700, color: 'var(--t1)', letterSpacing: '-.02em', marginBottom: 4, lineHeight: 1.15 }}>Funded Graduate Programs</div>
          <div style={{ fontSize: v.sub, color: 'var(--t2)', lineHeight: 1.5 }}>Current &amp; next-cycle MS/PhD positions — sorted by urgency.</div>
          {ann && <div className="annot l" style={{ left: 'calc(100% - 80px)', top: 32 }}>30 px / 700<br/>was 24</div>}
          {ann && <div className="annot l" style={{ left: 'calc(100% - 80px)', top: 70 }}>15 px<br/>was 13</div>}
        </div>

        <div style={{ fontSize: v.secLabel, fontWeight: 600, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--t1)', margin: '14px 0 10px', display: 'flex', alignItems: 'center', gap: 8, position: 'relative' }}>
          Closing soon
          <span style={{ fontSize: v.secCount, fontWeight: 500, padding: '1px 8px', borderRadius: 999, background: 'var(--red-bg)', color: '#993c1d', textTransform: 'none', letterSpacing: 0 }}>3</span>
          {ann && <div className="annot l" style={{ left: 200, top: -2 }}>13 px / 600<br/>was 11 / 500</div>}
        </div>

        <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '14px 18px', marginBottom: 8, borderLeft: '3px solid #d63a1f', position: 'relative' }}>
          <div style={{ fontSize: v.cardTitle, fontWeight: 600, color: 'var(--t1)', lineHeight: 1.35, marginBottom: 2 }}>MS Position — Wetland Carbon Dynamics</div>
          <div style={{ fontSize: v.cardOrg, color: 'var(--t3)', marginBottom: 6 }}>University of Tennessee · Knoxville, TN</div>
          <div style={{ fontSize: v.cardMeta, color: 'var(--t2)', marginBottom: 8, lineHeight: 1.5 }}>
            Deadline: <strong style={{ color: '#993c1d' }}>Dec 15, 2026 · 28 days</strong> &nbsp;·&nbsp; Stipend $30k
          </div>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            <span style={{ fontSize: v.pill, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: '#d63a1f', color: '#fff', letterSpacing: '.04em' }}>✨ NEW</span>
            <span style={{ fontSize: v.pill, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>✓ Saved</span>
            <span style={{ fontSize: v.pill, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: 'var(--red-bg)', color: '#993c1d' }}>28d left</span>
            <span style={{ fontSize: v.pill, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>Graduate</span>
          </div>
          {ann && <div className="annot l" style={{ left: 'calc(100% - 90px)', top: 16 }}>16 px / 600<br/>was 14 / 500</div>}
          {ann && <div className="annot l" style={{ left: 'calc(100% - 90px)', top: 78 }}>11 px pill<br/>was 10</div>}
        </div>

        <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '14px 18px', marginBottom: 8 }}>
          <div style={{ fontSize: v.cardTitle, fontWeight: 600, color: 'var(--t1)', marginBottom: 2 }}>Coastal Wetland Restoration Crew</div>
          <div style={{ fontSize: v.cardOrg, color: 'var(--t3)', marginBottom: 6 }}>The Nature Conservancy · Mobile Bay, AL</div>
          <div style={{ fontSize: v.cardMeta, color: 'var(--t2)' }}>
            Deadline: <strong style={{ color: 'var(--amber-t)' }}>Jan 31, 2027 · 75 days</strong>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   2.  HOME, DEMOTED — unchanged
   ═════════════════════════════════════════════════════════════════════════ */

function HomeBefore() {
  return (
    <div className="site" style={{ width: '100%', height: '100%', overflow: 'auto' }}>
      <GlobalNav scale="before" />
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '0 16px' }}>
        <div style={{ padding: '20px 0 14px' }}>
          <div style={{ fontSize: 11, fontWeight: 500, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 5 }}>Career &amp; Graduate School Planning</div>
          <div style={{ fontSize: 30, fontWeight: 700, color: 'var(--t1)', letterSpacing: '-.02em', marginBottom: 5, lineHeight: 1.15 }}>What's Next for Erin</div>
          <div style={{ fontSize: 13, color: 'var(--t2)', lineHeight: 1.5, marginBottom: 12 }}>A personalized resource hub — programs, internships, jobs &amp; trackers built for Erin Lamberton · BS Environmental Science, WCU '25 · Magna Cum Laude</div>
          <div style={{ display: 'flex', gap: 10, padding: '11px 14px', background: 'var(--teal-bg)', border: '1px solid var(--teal)', borderRadius: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--teal)', marginTop: 5 }} />
            <div style={{ flex: 1, fontSize: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.04em', textTransform: 'uppercase', color: 'var(--teal-t)', marginBottom: 4 }}>Latest opportunity sweep — May 18, 2026</div>
              <div style={{ color: 'var(--t2)' }}>New opportunities and refreshed deadlines. <span style={{ fontSize: 10, fontWeight: 700, background: 'var(--teal)', color: '#fff', padding: '2px 8px', borderRadius: 999 }}>✨ 7 new</span></div>
            </div>
          </div>
        </div>

        <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '14px 18px', marginBottom: 16, position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ fontSize: 18, fontWeight: 600 }}>🎯 What to do this week</div>
              <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>5</span>
            </div>
            <button style={{ fontSize: 12, background: 'var(--bg2)', border: '.5px solid var(--bd)', padding: '5px 12px', borderRadius: 8, color: 'var(--t2)' }}>Show ▾</button>
          </div>
          <div style={{ position: 'absolute', right: -120, top: 14, fontSize: 11, fontFamily: 'IBM Plex Mono,ui-monospace,monospace', color: '#a33828', width: 110, lineHeight: 1.35 }}>
            <div style={{ borderTop: '1px solid #a33828', paddingTop: 4 }}>collapsed by default — hides the page's actual job</div>
          </div>
        </div>

        <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '22px 20px', marginBottom: 16, position: 'relative' }}>
          <div style={{ display: 'flex', gap: 14, marginBottom: 14, alignItems: 'center' }}>
            <div style={{ width: 56, height: 56, borderRadius: '50%', background: '#e1f5ee', color: '#0f6e56', fontWeight: 500, fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>EL</div>
            <div>
              <div style={{ fontSize: 24, fontWeight: 500, marginBottom: 3 }}>Erin Lamberton</div>
              <div style={{ fontSize: 13, color: 'var(--t2)' }}>BS Environmental Science · Western Carolina University · Magna Cum Laude · May 2025</div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginBottom: 16 }}>
            {[['3.731', 'Cumulative GPA'], ['Magna', 'Cum Laude'], ['5+', "Dean's List"], ['3', "Chancellor's"]].map(([v, l]) => (
              <div key={l} style={{ background: 'var(--bg2)', borderRadius: 8, padding: '8px 10px' }}>
                <div style={{ fontSize: 20, fontWeight: 500 }}>{v}</div>
                <div style={{ fontSize: 11, color: 'var(--t3)', marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>

          <div style={{ fontSize: 11, fontWeight: 500, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 10 }}>Why this profile is competitive</div>
          <div style={{ fontSize: 13.5, color: 'var(--t2)', lineHeight: 1.8 }}>
            <p style={{ marginBottom: 12 }}>Erin graduates with a rare combination of <strong style={{ color: 'var(--t1)', fontWeight: 500 }}>rigorous interdisciplinary coursework</strong> and <strong style={{ color: 'var(--t1)', fontWeight: 500 }}>genuine hands-on field experience</strong> across wetlands, water quality, wildlife ecology, and GIS — disciplines that rarely overlap…</p>
            <p style={{ marginBottom: 12 }}>Her <strong style={{ color: 'var(--t1)', fontWeight: 500 }}>capstone research project</strong> — analyzing lead contamination in Pigeon River Basin sediments following Hurricane Helene (2024) — applied graduate-level methodology to a real, ongoing environmental disaster in her own backyard…</p>
          </div>
          <div style={{ position: 'absolute', right: -130, top: 80, fontSize: 11, fontFamily: 'IBM Plex Mono,ui-monospace,monospace', color: '#a33828', width: 120, lineHeight: 1.35 }}>
            <div style={{ borderTop: '1px solid #a33828', paddingTop: 4 }}>4 paragraphs of biography above the priority dashboard. Wrong order.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function HomeAfter() {
  return (
    <div className="site" style={{ width: '100%', height: '100%', overflow: 'auto' }}>
      <GlobalNav scale="after" />
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '0 16px' }}>
        <div style={{ padding: '20px 0 12px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 16, borderBottom: '.5px solid var(--bd)', marginBottom: 16, position: 'relative' }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 500, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 3 }}>Hello, Erin — Wednesday, May 20</div>
            <div style={{ fontSize: 26, fontWeight: 700, color: 'var(--t1)', letterSpacing: '-.015em' }}>What's next</div>
          </div>
          <a style={{ fontSize: 12.5, color: 'var(--teal-t)', fontWeight: 500, padding: '5px 11px', border: '.5px solid var(--teal)', borderRadius: 999 }}>View bio &amp; profile →</a>
          <div className="annot" style={{ left: -110, top: 22 }}>masthead<br/>compressed to<br/>one line</div>
        </div>

        <div style={{ display: 'flex', gap: 10, padding: '11px 14px', background: 'var(--teal-bg)', border: '1px solid var(--teal)', borderRadius: 8, marginBottom: 16 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--teal)', marginTop: 5 }} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: '.04em', textTransform: 'uppercase', color: 'var(--teal-t)', marginBottom: 3 }}>May 18 sweep — 7 new</div>
            <div style={{ fontSize: 12.5, color: 'var(--t2)' }}>2 graduate · 3 internships · 2 service. Jump to <span style={{ color: 'var(--teal-t)', fontWeight: 500 }}>Browse →</span></div>
          </div>
        </div>

        <div style={{ background: 'var(--bg)', border: '1px solid var(--bds)', borderRadius: 12, padding: '18px 20px', marginBottom: 16, position: 'relative', boxShadow: '0 1px 0 rgba(0,0,0,0.02)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-.005em' }}>What to do this week</div>
              <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>5</span>
            </div>
            <button style={{ fontSize: 12, background: 'transparent', border: 'none', color: 'var(--t3)', cursor: 'pointer' }}>Hide ▴</button>
          </div>
          <div style={{ fontSize: 12.5, color: 'var(--t3)', marginBottom: 14, lineHeight: 1.5 }}>Prioritized from every tracker. Click any card to jump there.</div>

          {[
            { sev: '#993c1d', sevBg: '#faece7', emoji: '🔴', t: 'Submit UTK Wetland MS application', d: 'Deadline Dec 15 · 28 days · materials 80% complete' },
            { sev: '#ef9f27', sevBg: '#f5f0db', emoji: '🟠', t: 'Email Dr. Forrester to confirm fit', d: 'Outreach drafted · waiting for your send' },
            { sev: '#ef9f27', sevBg: '#f5f0db', emoji: '🟠', t: 'Get 3rd recommender confirmation', d: 'Dr. Stevens — last contact 12 days ago' },
            { sev: '#4e9836', sevBg: 'transparent', emoji: '🟢', t: 'Polish SOP paragraph 3 (Helene capstone)', d: 'Draft saved · est. 30 min' },
          ].map((a, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 12px', background: a.sevBg, border: '.5px solid var(--bd)', borderLeft: `3px solid ${a.sev}`, borderRadius: 8, marginBottom: 6 }}>
              <div style={{ fontSize: 12, paddingTop: 2 }}>{a.emoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--t1)', marginBottom: 2, lineHeight: 1.35 }}>{a.t}</div>
                <div style={{ fontSize: 12, color: 'var(--t2)', lineHeight: 1.45 }}>{a.d}</div>
              </div>
              <div style={{ fontSize: 14, color: 'var(--t3)', alignSelf: 'center' }}>›</div>
            </div>
          ))}

          <div style={{ marginTop: 14, paddingTop: 12, borderTop: '.5px solid var(--bd)' }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 8 }}>Next deadlines</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[
                ['28d', 'UTK Wetland MS', '#993c1d', '#faece7'],
                ['45d', 'TNC Mobile Bay', '#ef9f27', '#f5f0db'],
                ['62d', 'EPA STAR fellowship', '#ef9f27', '#f5f0db'],
                ['90d', 'NCCC summer cohort', '#3c7b20', '#eaf3e5'],
              ].map(([d, t, c, bg]) => (
                <div key={t} style={{ flex: 1, padding: '8px 10px', background: bg, border: `.5px solid ${c}33`, borderRadius: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: c }}>{d}</div>
                  <div style={{ fontSize: 11, color: 'var(--t2)', marginTop: 2 }}>{t}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="annot l" style={{ left: 'calc(100% - 16px)', top: 14, width: 110 }}>default<br/>expanded</div>
        </div>

        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', margin: '8px 0 10px' }}>Jump to</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8, marginBottom: 12, position: 'relative' }}>
          {[
            { t: 'My list', d: '14 saved', icon: '★', accent: 'var(--teal-t)' },
            { t: 'Browse', d: '92 records', icon: '⌖', accent: 'var(--blue)' },
            { t: 'Timeline', d: '7 deadlines', icon: '▦', accent: 'var(--amber-t)' },
          ].map((x) => (
            <a key={x.t} style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 10, padding: '14px 14px' }}>
              <div style={{ fontSize: 18, color: x.accent, marginBottom: 4 }}>{x.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--t1)' }}>{x.t}</div>
              <div style={{ fontSize: 12, color: 'var(--t3)', marginTop: 2 }}>{x.d}</div>
            </a>
          ))}
          <div className="annot l" style={{ left: 'calc(100% - 16px)', top: 14, width: 120 }}>3 primary doors<br/>(was 18 tiles)</div>
        </div>

/* The expanded detail body — reused in inline and master-detail variants */
function DetailBody({ c, compact }) {

        <span style={{ fontSize: 10.5, fontWeight: 600, padding: '2px 8px', borderRadius: 999, background: c.urgBg, color: c.urgClr }}>{c.urg}{c.urg.match(/\d/) ? ' left' : ''}</span>
        <span style={{ fontSize: 10.5, fontWeight: 600, padding: '2px 8px', borderRadius: 999, background: 'var(--teal-bg)', color: 'var(--teal-t)' }}>★ Strong fit</span>

      <div style={{ fontSize: compact ? 18 : 22, fontWeight: 700, color: 'var(--t1)', letterSpacing: '-.01em', lineHeight: 1.25, marginBottom: 4 }}>{c.title}</div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>

          <div key={k} style={{ padding: '10px 12px', background: 'var(--bg2)', borderRadius: 8, border: '.5px solid var(--bd)' }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 3 }}>{k}</div>

      {/* Focus pills */}
      <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', marginBottom: 6 }}>Focus areas</div>

            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--t1)' }}>What's Next</div>
          </a>

/* Master-detail split — cards as a left rail, full detail on the right */
function CardMasterDetailView() {
  const [selectedId, setSelectedId] = useState('utk-wetland');
  const selected = SAMPLE_CARDS.find(c => c.id === selectedId);

  return (
    <CardPageShell title="My List" subtitle="14 saved · 1 open — Wetland Carbon Dynamics (UTK).">
      <div style={{ display: 'grid', gridTemplateColumns: '320px 1fr', gap: 18, alignItems: 'start' }}>
        {/* Left rail — compact cards */}
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', margin: '0 0 8px' }}>Closing soon</div>
          {SAMPLE_CARDS.slice(0, 3).map(c => (
            <div key={c.id} onClick={() => setSelectedId(c.id)} style={{
              background: c.id === selectedId ? 'var(--bg)' : 'transparent',
              border: c.id === selectedId ? '1.5px solid var(--teal)' : '.5px solid var(--bd)',

              <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--t1)', lineHeight: 1.3, marginBottom: 2 }}>{c.title}</div>
              <div style={{ fontSize: 11.5, color: 'var(--t3)' }}>{c.org}</div>
            </div>
          ))}

          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--t3)', margin: '14px 0 8px' }}>Upcoming</div>
          {SAMPLE_CARDS.slice(3).map(c => (
            <div key={c.id} onClick={() => setSelectedId(c.id)} style={{
              background: c.id === selectedId ? 'var(--bg)' : 'transparent',
              border: c.id === selectedId ? '1.5px solid var(--teal)' : '.5px solid var(--bd)',
              borderLeft: c.new ? '3px solid #d63a1f' : (c.id === selectedId ? '3px solid var(--teal)' : '.5px solid var(--bd)'),
              borderRadius: 8,

              cursor: 'pointer',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 3 }}>

              </div>
              <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--t1)', lineHeight: 1.3, marginBottom: 2 }}>{c.title}</div>
              <div style={{ fontSize: 11.5, color: 'var(--t3)' }}>{c.org}</div>
            </div>
          ))}
        </div>

        {/* Right pane — full detail */}
        <div style={{ background: 'var(--bg)', border: '.5px solid var(--bd)', borderRadius: 12, padding: '22px 26px', position: 'sticky', top: 20 }}>
          <DetailBody c={selected} compact={false} />
        </div>
      </div>
      <div style={{ position: 'fixed', bottom: 16, left: 16, fontSize: 10.5, fontFamily: 'IBM Plex Mono,ui-monospace,monospace', color: '#3c7b20', lineHeight: 1.4, maxWidth: 380 }}>
        Click any card in the left rail to load it on the right. List context stays visible; no scroll-pogo.
